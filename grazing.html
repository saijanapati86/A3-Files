<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vili's Family Bakery</title>
</head>
    <link rel="stylesheet" href="grazing.css">
    <link rel="stylesheet" href="pastries.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="sandwiches.css">
<body>
    <header>
        <nav>
            <ul class="nav_options">
                <li><a href="home.html">Home</a></li>
                <li>
                    <a style="pointer-events: none;">Bakery</a>
                    <ul class="dropdown">
                        <li><a href="pastries.html">Pastries</a></li>
                        <li><a href="sandwiches.html">Sandwiches</a></li>
                        <li><a href="cakes.html">Cakes</a></li>
                        <li><a href="grazing.html">Grazing</a></li>
                    </ul>
                </li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
        <a class="title" href='home.html'>Vili's</a>
        <a class="icon_place" href="#"><button>Shopping Cart</button></a>
        <a class="icon_place" href="#"><button>Search Bar</button></a>
    </header>

    <main class="products_page_g">

        <!--FILTERS-->

        <aside class="filter_panel_g">

            <h2>Availability</h2>

            <label class="filter_option_g">
                <input type="checkbox" unchecked>
                <span style="color: black;">In Stock (2)</span>
            </label>

            <label class="filter_option_g">
                <input type="checkbox" disabled>
                <span>Out of Stock (4)</span>
            </label>

        </aside>

        <!--PRODUCTS-->

        <section class="catalogue_g">

            <h2 class="product_count_g">3 Products</h2>

            <div class="product_grid_g">

                <button class="product_item_g">
                    <img src="Green.jpg" alt="Green Salad">
                    <h3>Green</h3>
                    <p class="price_g">$12.50</p>
                </button>

                <button class="product_item_g">
                    <img src="Veggie.jpg" alt="Veggie Salad">
                    <h3>Veggie</h3>
                    <p class="price_g">$15.00</p>
                </button>

                <button class="product_item_g">
                    <img src="Caesar.jpg" alt="Caesar Salad">
                    <h3>Caesar</h3>
                    <p class="price_g">$15.00</p>
                </button>

            </div>

        </section>

    </main>

    </body>
</html>
