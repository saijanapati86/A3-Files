<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vili's Family Bakery</title>
</head>
    <link rel="stylesheet" href="cakes.css">
    <link rel="stylesheet" href="pastries.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="sandwiches.css">
<body>
    <header>
        <nav>
            <ul class="nav_options">
                <li><a href="home.html">Home</a></li>
                <li>
                    <a style="pointer-events: none;">Bakery</a>
                    <ul class="dropdown">
                        <li><a href="pastries.html">Pastries</a></li>
                        <li><a href="sandwiches.html">Sandwiches</a></li>
                        <li><a href="cakes.html">Cakes</a></li>
                        <li><a href="#">Grazing</a></li>
                    </ul>
                </li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>
        </nav>
        <a class="title" href='home.html'>Vili's</a>
        <a class="icon_place" href="#"><button>Shopping Cart</button></a>
        <a class="icon_place" href="#"><button>Search Bar</button></a>
    </header>

    <main class="products_page_c">

        <!--FILTERS-->

        <aside class="filter_panel_c">

            <h2>Availability</h2>

            <label class="filter_option_c">
                <input type="checkbox" unchecked>
                <span style="color: black;">In Stock (2)</span>
            </label>

            <label class="filter_option_c">
                <input type="checkbox" disabled>
                <span>Out of Stock (4)</span>
            </label>

        </aside>

        <!--PRODUCTS-->

        <section class="catalogue_c">

            <h2 class="product_count_c">7 Products</h2>

            <div class="product_grid_c">

                <button class="product_item_c">
                    <img src="RVC.1.jpg" alt="Red Velvet Cake">
                    <h3>Red Velvet</h3>
                    <p class="price_c">$45.99</p>
                </button>

                <button class="product_item_c">
                    <img src="CC.1.jpg" alt="Chocolate Cake">
                    <h3>Chocolate</h3>
                    <p class="price_c">$35.99</p>
                </button>

                <button class="product_item_c">
                    <img src="BC.jpg" alt="Butterscotch Cake">
                    <h3>Butterscotch</h3>
                    <p class="price_c">$49.99</p>
                </button>

                <button class="product_item_c">
                    <img src="SB.jpg" alt="Strawberry Icing Cake">
                    <h3>Strawberry</h3>
                    <p class="price_c">$39.99</p>
                </button>

                <button class="product_item_c">
                    <img src="AP.jpg" alt="Apple Pie">
                    <h3>Apple Pie</h3>
                    <p class="price_c">$39.99</p>
                </button>

                <button class="product_item_c">
                    <img src="Cheese.jpg" alt="Cheesecake">
                    <h3>Winter Berry Cheesecake</h3>
                    <p class="price_c">$59.99</p>
                </button>

                <button class="product_item_c">
                    <img src="BF.jpg" alt="Blackforest Cake">
                    <h3>Blackforest</h3>
                    <p class="price_c">$59.99</p>
                </button>

                <div class="placeholder"></div>
                <div class="placeholder"></div>

            </div>

        </section>

    </main>

    </body>
</html>
